<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments — AR Menu Platform</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="dashboard-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div><div class="sidebar-logo-text">AR Menu</div><div class="sidebar-logo-sub">SUPER ADMIN</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Overview</div>
      <a class="nav-item" href="/admin">Dashboard</a>
      <div class="sidebar-section-label">Management</div>
      <a class="nav-item" href="/admin/restaurants">Restaurants</a>
      <a class="nav-item" href="/admin/menu">Menu Management</a>
      <a class="nav-item" href="/admin/qr">QR Generator</a>
      <div class="sidebar-section-label">Billing</div>
      <a class="nav-item active" href="/admin/payments">Payments</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUserBtn">
        <div class="user-avatar" id="avatarInitial">A</div>
        <div><div class="user-name" id="adminName">Admin</div><div class="user-role">Super Admin</div></div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <header class="topbar">
      <button class="topbar-menu-btn" id="menuToggle">Menu</button>
      <div class="topbar-breadcrumb">
        <span>Admin</span><span>/</span><span class="current">Payments</span>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header animate-in">
        <div class="page-header-text">
          <h1>Payment Overview</h1>
          <p>Track subscriptions, revenue, and billing status</p>
        </div>
      </div>

      <div class="grid-4 animate-in animate-in-delay-1" id="paymentStats">
        <div class="stat-card skeleton" style="min-height:120px;"></div>
        <div class="stat-card skeleton" style="min-height:120px;"></div>
        <div class="stat-card skeleton" style="min-height:120px;"></div>
        <div class="stat-card skeleton" style="min-height:120px;"></div>
      </div>

      <div class="tabs animate-in animate-in-delay-2" style="margin: var(--space-8) 0 var(--space-5);">
        <button class="tab active" id="tab-all" onclick="switchTab('all')">All Restaurants</button>
        <button class="tab" id="tab-active" onclick="switchTab('active')">Active</button>
        <button class="tab" id="tab-expired" onclick="switchTab('expired')">Expired</button>
        <button class="tab" id="tab-autopay" onclick="switchTab('autopay')">Autopay ON</button>
      </div>

      <div class="card animate-in animate-in-delay-3" style="padding:0;">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Restaurant</th>
                <th>Plan</th>
                <th>Status</th>
                <th>Autopay</th>
                <th>Next Payment</th>
                <th>Razorpay Sub ID</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="paymentsBody">
              <tr><td colspan="7"><div class="skeleton" style="height:36px; margin:8px 16px; border-radius:6px;"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <style>
  .tabs { display:flex; gap:4px; background:var(--bg-surface); padding:4px; border-radius:var(--radius-lg); width:fit-content; border:1px solid var(--border); }
  .tab { background:none; border:none; padding:8px 18px; border-radius:var(--radius-md); font-size:.85rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:var(--transition); font-family:inherit; }
  .tab:hover { color:var(--text-primary); }
  .tab.active { background:var(--bg-elevated); color:var(--text-primary); box-shadow:var(--shadow-sm); }
  </style>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { showToast, formatDate, getStatusBadge, animateCount } from '../js/utils.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = '../login.html'; }
    else {
      const { data: p } = await supabase.from('users').select('role,email').eq('id', session.user.id).single();
      if (p?.role !== 'super_admin') window.location.href = '../login.html';
      document.getElementById('adminName').textContent = p.email.split('@')[0];
      document.getElementById('avatarInitial').textContent = p.email[0].toUpperCase();
    }

    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    });

    let allData = [];
    async function load() {
      const { data, error } = await supabase.from('restaurants').select('*').order('created_at', { ascending: false });
      if (error) { showToast('Error loading data', 'error'); return; }
      allData = data;
      const active = data.filter(r => r.subscription_status === 'active');
      const expired = data.filter(r => r.subscription_status === 'expired');
      const autopay = data.filter(r => r.autopay_enabled);
      const revenue = active.reduce((s, r) => s + (r.plan === 'pro' ? 449 : 249), 0);
      document.getElementById('paymentStats').innerHTML = `
        <div class="stat-card green"><div class="stat-value" id="sActive">0</div><div class="stat-label">Active Subscriptions</div></div>
        <div class="stat-card purple"><div class="stat-value" id="sExpired">0</div><div class="stat-label">Expired</div></div>
        <div class="stat-card blue"><div class="stat-value" id="sAutopay">0</div><div class="stat-label">Autopay Enabled</div></div>
        <div class="stat-card amber"><div class="stat-value" id="sRevenue">0</div><div class="stat-label">Est. Monthly Revenue</div></div>
      `;
      animateCount(document.getElementById('sActive'), active.length);
      animateCount(document.getElementById('sExpired'), expired.length);
      animateCount(document.getElementById('sAutopay'), autopay.length);
      animateCount(document.getElementById('sRevenue'), revenue);
      renderTable(data);
    }

    function renderTable(list) {
      const tbody = document.getElementById('paymentsBody');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">No data</div></td></tr>'; return; }
      tbody.innerHTML = list.map(r => `
        <tr>
          <td class="td-primary">${r.name}</td>
          <td><span class="badge badge-primary">${r.plan || '—'}</span></td>
          <td>${getStatusBadge(r.subscription_status || 'pending')}</td>
          <td>${r.autopay_enabled ? '<span class="badge badge-success">ON</span>' : '<span class="badge badge-secondary">OFF</span>'}</td>
          <td style="font-size:.8rem;color:var(--text-muted);">${formatDate(r.next_payment_date)}</td>
          <td style="font-size:.7rem;color:var(--text-muted);font-family:monospace;">${r.razorpay_subscription_id || '—'}</td>
          <td><button class="btn btn-sm ${r.subscription_status === 'active' ? 'btn-danger' : 'btn-success'}" onclick="toggleStatus('${r.id}', '${r.subscription_status}')">${r.subscription_status === 'active' ? 'Deactivate' : 'Activate'}</button></td>
        </tr>
      `).join('');
    }

    window.switchTab = (tab) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      let filtered = allData;
      if (tab === 'active') filtered = allData.filter(r => r.subscription_status === 'active');
      if (tab === 'expired') filtered = allData.filter(r => r.subscription_status === 'expired');
      if (tab === 'autopay') filtered = allData.filter(r => r.autopay_enabled);
      renderTable(filtered);
    };

    window.toggleStatus = async (id, current) => {
      const newStatus = current === 'active' ? 'expired' : 'active';
      try {
        await supabase.from('restaurants').update({ subscription_status: newStatus }).eq('id', id);
        showToast(`Status updated to ${newStatus}.`, 'success');
        load();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    };
    load();
  </script>
</body>
</html>
