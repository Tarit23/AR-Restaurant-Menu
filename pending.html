<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Pending — AR Menu Platform</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .pending-container {
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
      padding-top: 10vh;
    }
    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #f59e0b;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .pending-title {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 16px;
      color: #fff;
    }
    .pending-text {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .action-row {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
  </style>
</head>
<body class="login-body">
  <div class="login-bg">
    <div class="login-orb orb-1"></div>
    <div class="login-orb orb-2"></div>
  </div>

  <div class="container pending-container">
    <div class="status-badge">Account Active</div>
    <h1 class="pending-title">Access <span class="gradient-text">Pending</span></h1>
    <p class="pending-text">
      We've successfully authenticated your Google account. However, your email is not yet linked to a restaurant dashboard. 
      <br><br>
      Please contact your administrator to activate your restaurant access, or make sure you are using the correct Gmail address.
    </p>

    <div class="action-row">
      <button id="logoutBtn" class="btn btn-secondary">Sign Out</button>
      <button id="checkStatusBtn" class="btn btn-ghost">Check Status</button>
      <a href="mailto:support@armenu.app" class="btn btn-primary">Contact Support</a>
    </div>
  </div>

  <script type="module">
    import "./js/logout-handler.js";
    import { supabase } from './js/supabase-config.js';
    import { showToast } from './js/utils.js';

    async function checkStatus(isManual = false) {
      if (isManual) {
        const btn = document.getElementById('checkStatusBtn');
        btn.textContent = 'Checking...';
        btn.disabled = true;
      }

      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) return;

        const { data: profile, error } = await supabase
          .from('users')
          .select('*, restaurants(*)')
          .eq('id', session.user.id)
          .single();

        if (error) throw error;

        if (profile) {
          const restaurant = Array.isArray(profile.restaurants) ? profile.restaurants[0] : profile.restaurants;
          
          if (profile.role === 'super_admin') {
            window.location.href = '/admin/index.html';
          } else if (restaurant && restaurant.id) {
            console.log('Restaurant found! Redirecting to dashboard...');
            window.location.href = '/restaurant/index.html';
          } else if (isManual) {
            showToast('No restaurant dashboard found for this account yet.', 'info');
          }
        }
      } catch (err) {
        console.error('Status check failed:', err);
        if (isManual) showToast('Check failed. Please try again.', 'error');
      } finally {
        if (isManual) {
          const btn = document.getElementById('checkStatusBtn');
          btn.textContent = 'Check Status';
          btn.disabled = false;
        }
      }
    }

    document.getElementById('checkStatusBtn').onclick = () => checkStatus(true);

    // Auto-check every 10 seconds (less aggressive than 5s)
    setInterval(() => checkStatus(false), 10000);
  </script>
</body>
</html>
