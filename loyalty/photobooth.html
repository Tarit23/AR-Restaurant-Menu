<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Instagram Photo Booth — AR Menu</title>
  <link rel="stylesheet" href="../css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #09090f;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f1f5f9;
      --primary: #6366f1;
      --success: #10b981;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .booth-container {
      width: 100%;
      max-width: 440px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
    }

    /* ── Camera View & Overlays ── */
    .camera-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    #cameraVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror camera */
    }

    /* Frame Overlay Layer */
    .frame-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
      padding: 24px;
      transition: all 0.3s ease;
    }

    /* Frame Styles */
    .frame-overlay.style-1 {
      border: 16px solid #d4af37; /* Luxury Gold */
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      font-family: 'Playfair Display', serif;
      color: #fff;
    }
    .frame-overlay.style-2 {
      border: 12px solid #ff007f; /* Neon Cyber */
      box-shadow: inset 0 0 20px #ff007f;
      color: #00ffcc;
      font-family: monospace;
      text-shadow: 0 0 8px #00ffcc;
    }
    .frame-overlay.style-3 {
      border: 20px solid #1a1a1a; /* Polaroid/Vintage Film */
      border-bottom-width: 60px;
      color: #ffffff;
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .frame-overlay.style-4 {
      border: 12px dashed #ef4444; /* Foodie Love */
      color: #ffffff;
      font-weight: 800;
    }
    .frame-overlay.style-5 {
      border: 16px solid #3b82f6; /* Classic Diner Blue */
      border-radius: 8px;
      color: #f59e0b;
      font-weight: 900;
    }

    .frame-text-top {
      font-size: 1.1rem;
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .frame-text-bottom {
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      margin-top: auto;
    }

    /* ── Controls ── */
    .selector-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      width: 100%;
    }
    .selector-btn {
      flex-shrink: 0;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.78rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .selector-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .action-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
    }

    .capture-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #ffffff;
      border: 6px solid var(--primary);
      cursor: pointer;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
      transition: transform 0.2s;
    }
    .capture-btn:active {
      transform: scale(0.9);
    }

    /* ── Preview Modal ── */
    .preview-modal {
      position: fixed;
      inset: 0;
      background: rgba(9,9,15,0.95);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .preview-modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .preview-img {
      max-width: 100%;
      max-height: 60vh;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      margin-bottom: 20px;
    }

    /* ── Instructions Modal ── */
    .instructions-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="booth-container">
    <div class="header">
      <h2 style="font-size:1.25rem; font-weight:800; margin:0;">📸 Photo Booth</h2>
      <a class="back-btn" id="backBtn" href="#">Dashboard</a>
    </div>

    <!-- Live Cam Window -->
    <div class="camera-wrapper">
      <video id="cameraVideo" autoplay playsinline></video>
      
      <!-- Live frame overlay -->
      <div class="frame-overlay style-1" id="liveFrameOverlay">
        <div class="frame-text-top" id="overlayTopText">Dine-In Style</div>
        <div class="frame-text-bottom" id="overlayBottomText">My Restaurant</div>
      </div>
    </div>

    <!-- Frame Selectors -->
    <div>
      <div style="font-size:0.75rem; font-weight:600; color:var(--text-sec); margin-bottom:8px; text-transform:uppercase;">Select Frame Design:</div>
      <div class="selector-row">
        <button class="selector-btn active" onclick="setFrameStyle(1, 'Luxury Gold', 'Fine Dining')">✨ Gold Luxury</button>
        <button class="selector-btn" onclick="setFrameStyle(2, 'Gamer Fuel', 'Cyber Lounge')">⚡ Neon Cyber</button>
        <button class="selector-btn" onclick="setFrameStyle(3, '', 'Delicious Memories')">🎬 Retro Film</button>
        <button class="selector-btn" onclick="setFrameStyle(4, 'Yum! Best Meal', 'Foodie Love')">❤️ Foodie Love</button>
        <button class="selector-btn" onclick="setFrameStyle(5, 'Dine-In Classic', 'Good Times')">🍔 Diner Classic</button>
      </div>
    </div>

    <!-- Capture Trigger -->
    <div class="action-row">
      <button class="capture-btn" id="captureBtn" onclick="takeSnapshot()"></button>
    </div>
  </div>

  <!-- ── SNAPSHOT PREVIEW MODAL ── -->
  <div class="preview-modal" id="previewModal">
    <h3 style="margin-bottom:12px;">Review Snapshot</h3>
    <img id="previewImg" class="preview-img" src="" alt="Snapshot Preview" />
    
    <div style="display:flex; flex-direction:column; gap:10px; width:100%; max-width:320px;">
      <button class="btn btn-success" onclick="downloadImage()">💾 Download Photo</button>
      <button class="btn btn-primary" onclick="openInstagramInstructions()">📱 Share on Instagram</button>
      <button class="btn btn-secondary" onclick="closePreview()">✕ Retake Photo</button>
    </div>
  </div>

  <!-- ── INSTAGRAM SHARING MODAL ── -->
  <div class="modal-backdrop" id="instructionsModal">
    <div class="instructions-card">
      <div style="font-size:3rem; margin-bottom:12px;">📱</div>
      <h3 style="margin-bottom:8px;">Share to Instagram</h3>
      <p style="font-size:0.88rem; color:var(--text-sec); line-height:1.5; margin-bottom:16px;">
        1. Click <strong>Download Photo</strong> below.<br/>
        2. Open <strong>Instagram Stories</strong>.<br/>
        3. Upload your photo and tag <strong><span id="instTag">@ARMenu</span></strong>.<br/>
        4. Show your posted story to waiter to receive <strong>50 bonus Loyalty Points!</strong> 🎉
      </p>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('instructionsModal').classList.remove('open')">Close</button>
        <button class="btn btn-primary btn-sm" onclick="downloadImage()">Download Photo</button>
      </div>
    </div>
  </div>

  <!-- Hidden canvas for rendering image with high-res mirrored camera frame -->
  <canvas id="snapshotCanvas" style="display:none;" width="640" height="853"></canvas>

  <script type="module">
    import { supabase } from "/js/supabase-config.js?v=3";

    const params = new URLSearchParams(window.location.search);
    const restaurantId = params.get('restaurant');
    let restaurantName = "AR Restaurant";
    let activeStyle = 1;
    let textTop = "Fine Dining";
    let textBottom = "AR Restaurant";
    let videoStream = null;

    (async function init() {
      // Setup navigation link back
      document.getElementById('backBtn').href = `/loyalty/dashboard?restaurant=${restaurantId}`;

      // Fetch restaurant name
      try {
        const { data: rest } = await supabase.from('restaurants').select('name').eq('id', restaurantId).single();
        if (rest) {
          restaurantName = rest.name;
          textBottom = rest.name;
          document.getElementById('overlayBottomText').textContent = rest.name;
        }
      } catch (e) {
        console.warn("Could not load restaurant name:", e.message);
      }

      // Initialize Webcam
      startWebcam();
    })();

    async function startWebcam() {
      const video = document.getElementById('cameraVideo');
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 850 } },
          audio: false
        });
        video.srcObject = videoStream;
      } catch (err) {
        alert("Camera access denied or unavailable. Please enable permissions to use the Photo Booth!");
      }
    }

    window.setFrameStyle = (styleId, top, bottom) => {
      activeStyle = styleId;
      textTop = top || "Delicious Memories";
      textBottom = bottom === "Delicious Memories" ? restaurantName : bottom || restaurantName;

      // Update selector UI
      const buttons = document.querySelectorAll('.selector-btn');
      buttons.forEach((btn, idx) => {
        btn.classList.toggle('active', idx === (styleId - 1));
      });

      // Update overlay CSS
      const overlay = document.getElementById('liveFrameOverlay');
      overlay.className = `frame-overlay style-${styleId}`;

      // Update texts
      document.getElementById('overlayTopText').textContent = textTop;
      document.getElementById('overlayBottomText').textContent = textBottom;
    };

    window.takeSnapshot = () => {
      const video = document.getElementById('cameraVideo');
      const canvas = document.getElementById('snapshotCanvas');
      const ctx = canvas.getContext('2d');

      // 1. Draw mirrored video stream frame on canvas
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      // 2. Compile Frame design on top of the image
      drawFrameOverlayOnCanvas(ctx, canvas.width, canvas.height);

      // Show preview
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      document.getElementById('previewImg').src = dataUrl;
      document.getElementById('previewModal').classList.add('open');
    };

    function drawFrameOverlayOnCanvas(ctx, w, h) {
      ctx.save();

      if (activeStyle === 1) {
        // Gold luxury border
        ctx.strokeStyle = '#d4af37';
        ctx.lineWidth = 32;
        ctx.strokeRect(16, 16, w - 32, h - 32);

        // Text
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 8;

        ctx.font = "bold 28px 'Playfair Display', Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText(textTop.toUpperCase(), w/2, 60);

        ctx.font = "bold 24px 'Playfair Display', Georgia, serif";
        ctx.fillText(textBottom, w/2, h - 60);

      } else if (activeStyle === 2) {
        // Neon Cyber
        ctx.strokeStyle = '#ff007f';
        ctx.lineWidth = 24;
        ctx.strokeRect(12, 12, w - 24, h - 24);

        ctx.fillStyle = '#00ffcc';
        ctx.font = "900 28px Courier New, monospace";
        ctx.textAlign = "center";
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 10;
        ctx.fillText(`// ${textTop.toUpperCase()}`, w/2, 60);
        ctx.fillText(`[ ${textBottom} ]`, w/2, h - 60);

      } else if (activeStyle === 3) {
        // Polaroid Vintage
        ctx.fillStyle = '#1a1a1a';
        // Draw vintage polaroid block
        ctx.fillRect(0, 0, w, 32);
        ctx.fillRect(0, 0, 32, h);
        ctx.fillRect(w - 32, 0, 32, h);
        ctx.fillRect(0, h - 120, w, 120);

        // Text in bottom polaroid area
        ctx.fillStyle = '#ffffff';
        ctx.font = "italic 26px Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText(textBottom, w/2, h - 60);

      } else if (activeStyle === 4) {
        // Foodie Love dashed border
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 24;
        ctx.strokeRect(12, 12, w - 24, h - 24);

        ctx.fillStyle = '#ffffff';
        ctx.font = "bold 30px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("❤️ " + textTop.toUpperCase() + " ❤️", w/2, 65);
        ctx.fillText(textBottom, w/2, h - 65);

      } else if (activeStyle === 5) {
        // Diner blue
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 32;
        ctx.strokeRect(16, 16, w - 32, h - 32);

        ctx.fillStyle = '#f59e0b';
        ctx.font = "900 32px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(textTop, w/2, 70);
        ctx.fillText("⭐ " + textBottom + " ⭐", w/2, h - 70);
      }

      ctx.restore();
    }

    window.closePreview = () => {
      document.getElementById('previewModal').classList.remove('open');
    };

    window.downloadImage = () => {
      const canvas = document.getElementById('snapshotCanvas');
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      
      const link = document.createElement('a');
      link.download = `ar_menu_booth_${restaurantName.toLowerCase().replace(/\s+/g, '_')}.jpg`;
      link.href = dataUrl;
      link.click();
    };

    window.openInstagramInstructions = () => {
      // Set handle text
      document.getElementById('instTag').textContent = `@${restaurantName.replace(/\s+/g, '')}`;
      document.getElementById('instructionsModal').classList.add('open');
    };
  </script>
</body>
</html>
