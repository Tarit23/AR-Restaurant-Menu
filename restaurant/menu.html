<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Menu — AR Menu Platform</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="dashboard-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"></div>
      <div><div class="sidebar-logo-text">AR Menu</div><div class="sidebar-logo-sub" id="restNameSub">Restaurant</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">My Restaurant</div>
      <a class="nav-item" href="/restaurant">Dashboard</a>
      <a class="nav-item active" href="/restaurant/menu">My Menu</a>
      <a class="nav-item" href="/restaurant/subscription">Subscription</a>
      <a class="nav-item" href="/restaurant/qr">QR Code</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUserBtn">
        <div class="user-avatar" id="avatarInitial">R</div>
        <div><div class="user-name" id="restName">Restaurant</div><div class="user-role">Restaurant Owner</div></div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <header class="topbar">
      <button class="topbar-menu-btn" id="menuToggle">Menu</button>
      <div class="topbar-breadcrumb">
        <span id="topbarRestName">Restaurant</span><span>/</span><span class="current">My Menu</span>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header animate-in">
        <div class="page-header-text">
          <h1>My Menu</h1>
          <p>Edit dish names, prices, and availability</p>
        </div>
      </div>

      <div class="card animate-in animate-in-delay-1" style="background:rgba(59,130,246,0.08); border-color:rgba(59,130,246,0.2); margin-bottom:var(--space-6);">
        <div style="display:flex; gap:var(--space-3); align-items:center; color:var(--info); font-size:.875rem;">
          <span>i</span>
          <span>You can edit <strong>name, price, and availability</strong> only. Contact your admin to update images or 3D models.</span>
        </div>
      </div>

      <div id="menuGrid" class="menu-grid animate-in animate-in-delay-2"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Edit Dish</h3>
        <button class="modal-close" onclick="document.getElementById('editModal').classList.remove('open')">×</button>
      </div>
      <div class="modal-body">
        <form id="editForm" novalidate>
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label class="form-label" for="editName">Dish Name</label>
            <input type="text" id="editName" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="editPrice">Price (₹)</label>
            <div class="input-group">
              <span class="input-prefix">₹</span>
              <input type="number" id="editPrice" class="form-control" min="0" required style="border-radius:0 var(--radius-md) var(--radius-md) 0;" />
            </div>
          </div>
          <div class="form-group">
            <label class="toggle-wrapper">
              <label class="toggle">
                <input type="checkbox" id="editAvailable" />
                <span class="toggle-track"></span>
                <span class="toggle-thumb"></span>
              </label>
              <span style="font-size:.875rem; color:var(--text-secondary);">Available on menu</span>
            </label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('editModal').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" id="saveEditBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <style>
  .menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:var(--space-5); }
  .dish-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; transition:var(--transition-slow); animation:fadeIn .4s ease both; }
  .dish-card:hover { transform:translateY(-3px); border-color:rgba(99,102,241,.25); box-shadow:var(--shadow-md); }
  .dish-img { width:100%; height:170px; object-fit:cover; background:var(--bg-elevated); }
  .dish-img-ph { width:100%; height:170px; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:1.1rem; color:var(--text-muted); }
  .dish-body { padding:var(--space-4); }
  .dish-name { font-size:1rem; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
  .dish-price { font-size:1.1rem; font-weight:800; color:var(--primary-light); }
  .dish-meta { display:flex; gap:6px; margin-top:var(--space-3); flex-wrap:wrap; }
  .dish-actions { display:flex; gap:var(--space-2); padding:var(--space-3) var(--space-4); border-top:1px solid var(--border); }
  .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
  .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
  .badge-danger { background: rgba(239,68,68,0.1); color: var(--danger); }
  .badge-info { background: rgba(6,182,212,0.1); color: var(--accent); }
  </style>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { menuAPI } from '../js/api.js';
    import { showToast } from '../js/utils.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = '../login.html'; }

    const { data: profile } = await supabase.from('users').select('*, restaurants(*)').eq('id', session.user.id).single();
    if (!profile || profile.role === 'super_admin') window.location.href = '../admin/index.html';

    const restaurant = profile.restaurants;

    document.getElementById('restName').textContent    = restaurant.name;
    document.getElementById('restNameSub').textContent = restaurant.name.substring(0,16);
    document.getElementById('topbarRestName').textContent = restaurant.name;
    document.getElementById('avatarInitial').textContent  = restaurant.name[0].toUpperCase();

    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    });

    async function loadMenu() {
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = '<div class="skeleton" style="height:280px;border-radius:var(--radius-xl);"></div>';

      const items = await menuAPI.getByRestaurant(restaurant.id);

      if (!items.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-title">No dishes yet</div><div class="empty-state-text">Your admin will add dishes to your menu.</div></div>`;
        return;
      }

      grid.innerHTML = items.map((item, i) => `
        <div class="dish-card" style="animation-delay:${i*0.05}s;">
          ${item.image_url ? `<img class="dish-img" src="${item.image_url}" alt="${item.name}" loading="lazy" />` : '<div class="dish-img-ph">No Image</div>'}
          <div class="dish-body">
            <div class="dish-name">${item.name}</div>
            <div class="dish-price">₹${item.price?.toLocaleString('en-IN')}</div>
            <div class="dish-meta">
              ${item.is_available ? '<span class="badge badge-success">Available</span>' : '<span class="badge badge-danger">Unavailable</span>'}
              ${item.model_url ? '<span class="badge badge-info">AR Ready</span>' : ''}
            </div>
          </div>
          <div class="dish-actions">
            <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="openEdit('${item.id}','${item.name}',${item.price},${item.is_available})">Edit</button>
            <button class="btn ${item.is_available ? 'btn-danger' : 'btn-success'} btn-sm" onclick="toggleAvail('${item.id}',${item.is_available})">
              ${item.is_available ? 'Mark Unavailable' : 'Mark Available'}
            </button>
          </div>
        </div>
      `).join('');
    }

    window.openEdit = (id, name, price, available) => {
      document.getElementById('editId').value = id;
      document.getElementById('editName').value = name;
      document.getElementById('editPrice').value = price;
      document.getElementById('editAvailable').checked = available;
      document.getElementById('editModal').classList.add('open');
    };

    window.toggleAvail = async (id, current) => {
      try {
        await menuAPI.toggleAvailability(id, current);
        showToast('Availability updated.', 'success');
        loadMenu();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    };

    document.getElementById('saveEditBtn').addEventListener('click', async () => {
      const id    = document.getElementById('editId').value;
      const name  = document.getElementById('editName').value.trim();
      const price = parseFloat(document.getElementById('editPrice').value);
      const avail = document.getElementById('editAvailable').checked;

      if (!name || isNaN(price)) { showToast('Fill in all fields.', 'warning'); return; }

      const btn = document.getElementById('saveEditBtn');
      btn.classList.add('loading');
      try {
        await menuAPI.update(id, { name, price, is_available: avail });
        showToast('Dish updated!', 'success');
        document.getElementById('editModal').classList.remove('open');
        loadMenu();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
      finally { btn.classList.remove('loading'); }
    });

    loadMenu();
  </script>
</body>
</html>
