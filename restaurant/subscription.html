<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Subscription — AR Menu Platform</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style id="critical-logout-styles">
    .sidebar-footer { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
    .btn-logout { 
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; 
      padding: 10px; background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.1); 
      border-radius: var(--radius-md); color: #ef4444; font-size: 0.85rem; font-weight: 600; 
      cursor: pointer; transition: all 0.2s; 
    }
    .btn-logout:hover { background: #ef4444; color: #fff; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
  </style>

</head>
<body class="dashboard-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"></div>
      <div>
        <div class="sidebar-logo-text">AR Menu</div>
        <div class="sidebar-logo-sub" id="restNameSub">Restaurant</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">My Restaurant</div>
      <a class="nav-item" href="/restaurant">Dashboard</a>
      <a class="nav-item" href="/restaurant/menu">My Menu</a>
      <a class="nav-item active" href="/restaurant/subscription">Subscription</a>
      <a class="nav-item" href="/restaurant/qr">QR Code</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="avatarInitial">R</div>
        <div style="flex:1; min-width:0;">
          <div class="user-name" id="restaurantName">Loading...</div>
          <div class="user-role">Restaurant Owner</div>
        </div>
      </div>
      <div class="sidebar-logout">
        <button class="btn-logout" id="logoutBtn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Sign Out
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-breadcrumb">
        <span>Restaurant</span><span>/</span><span class="current">Subscription</span>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header animate-in">
        <div class="page-header-text">
          <h1>Subscription & Autopay</h1>
          <p>Choose a plan to activate your AR menu features with automated recurring payments.</p>
        </div>
      </div>

      <div id="statusCard" class="card glass animate-in animate-in-delay-1" style="margin-bottom: var(--space-8); border-left: 4px solid var(--primary);">
        <div class="card-body" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px;">
          <div>
            <div style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:4px;">Current Status</div>
            <div style="display:flex; align-items:center; gap:12px;">
              <h2 id="currentPlanName" style="margin:0;">Checking...</h2>
              <span id="statusBadge"></span>
            </div>
          </div>
          <div style="text-align:right;">
            <div id="nextPaymentText" style="font-size:0.9rem; color:var(--text-secondary);"></div>
            <div id="autopayStatus" style="font-size:0.8rem; font-weight:600; margin-top:4px;"></div>
          </div>
        </div>
      </div>

      <h2 style="margin-bottom: var(--space-6);">Available Plans</h2>
      <div class="grid-2 animate-in animate-in-delay-2" id="plansGrid">
        <!-- Plans will be injected here -->
      </div>
    </div>
  </div>

  <style>
    .plan-card {
      padding: var(--space-8);
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .plan-card.current {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(99,102,241,0.1);
    }
    .plan-price { font-size: 2.5rem; font-weight: 800; margin: var(--space-4) 0; }
    .plan-price span { font-size: 1rem; color: var(--text-muted); font-weight: 400; }
    .feature-list { list-style:none; padding:0; margin: var(--space-6) 0; flex: 1; }
    .feature-list li { display:flex; gap:10px; margin-bottom:var(--space-3); font-size:0.9rem; color:var(--text-secondary); }
    .feature-list li::before { content: "✓"; color: var(--success); font-weight: bold; }
    
    .loading-overlay {
      position: fixed; inset:0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display:flex; align-items:center; justify-content:center; z-index: 9999;
    }
  </style>

  <script type="module">

  import "/js/logout-handler.js";
  import { supabase, RAZORPAY_KEY_ID, APP_CONFIG } from '/js/supabase-config.js?v=2';
  import { formatDate, showToast } from '/js/utils.js';

    let restaurant = null;
    let profile = null;
    let currentSession = null;

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = '../login.html'; return; }
      currentSession = session;

      const { data: prof } = await supabase.from('users').select('*, restaurants(*)').eq('id', session.user.id).single();
      profile = prof;
      // Handle Supabase returning restaurants as an array or object
      restaurant = Array.isArray(prof.restaurants) ? prof.restaurants[0] : prof.restaurants;

      if (!restaurant) {
        console.error('No restaurant found for user:', session.user.id);
        showToast('Restaurant record not found. Please contact support.', 'error');
        return;
      }

      updateUI();
      renderPlans();
      
      // Populate sidebar
      document.getElementById('restaurantName').textContent = restaurant.name;
      document.getElementById('restNameSub').textContent = restaurant.name.substring(0, 16);
      document.getElementById('avatarInitial').textContent = restaurant.name[0].toUpperCase();
    }

    function updateUI() {
      document.getElementById('currentPlanName').textContent = (restaurant.plan || 'No Plan').toUpperCase();
      
      const badge = document.getElementById('statusBadge');
      const status = restaurant.subscription_status || 'pending';
      badge.innerHTML = `<span class="badge badge-${status === 'active' ? 'success' : status === 'pending' ? 'warning' : 'danger'}">${status.toUpperCase()}</span>`;

      if (restaurant.next_payment_date) {
        document.getElementById('nextPaymentText').textContent = `Renewal Date: ${formatDate(restaurant.next_payment_date)}`;
      }

      const autopay = document.getElementById('autopayStatus');
      if (restaurant.autopay_enabled) {
        autopay.textContent = '● UPI Autopay Enabled';
        autopay.style.color = 'var(--success)';
      } else {
        autopay.textContent = '○ Autopay Disabled';
        autopay.style.color = 'var(--text-muted)';
      }
    }

    function renderPlans() {
      const grid = document.getElementById('plansGrid');
      grid.innerHTML = Object.entries(APP_CONFIG.plans).map(([key, plan]) => {
        const isCurrent = restaurant.plan === key;
        return `
          <div class="card glass plan-card ${isCurrent ? 'current' : ''}">
            <h3>${plan.name}</h3>
            <div class="plan-price">₹${plan.price / 100}<span>/mo</span></div>
            <ul class="feature-list">
              ${plan.features.map(f => `<li>${f}</li>`).join('')}
            </ul>
            <button class="btn ${isCurrent && restaurant.autopay_enabled ? 'btn-ghost' : 'btn-primary'} btn-full" 
                    ${isCurrent && restaurant.autopay_enabled ? 'disabled' : ''} 
                    onclick="window.startSubscription('${key}')">
              ${isCurrent && restaurant.autopay_enabled ? 'Current Plan (Autopay Active)' : isCurrent ? 'Setup Autopay' : 'Select Plan & Set Autopay'}
            </button>
          </div>
        `;
      }).join('');
    }

    window.startSubscription = async (planKey) => {
      if (!currentSession) {
        showToast('Session expired. Please log in again.', 'error');
        return;
      }

      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loader"></div><div style="margin-left:20px; color:#fff;">Preparing UPI Autopay...</div>';
      document.body.appendChild(overlay);

      try {
        console.log('Initiating subscription for:', planKey);
        
        // 1. Call Edge Function to create subscription
        const { data, error } = await supabase.functions.invoke('create-subscription', {
          body: {
            restaurantId: restaurant.id,
            plan: planKey,
            email: currentSession.user.email,
            name: restaurant.name
          }
        });

        if (error) {
          console.error('Edge Function Error:', error);
          let msg = error.message || 'Failed to create subscription on server';
          if (error.context && typeof error.context.json === 'function') {
            try {
              const body = await error.context.json();
              if (body && body.error) msg = body.error;
            } catch (e) {}
          }
          throw new Error(msg);
        }
        
        if (data.error) throw new Error(data.error);
        if (!data.id) throw new Error('No subscription ID returned from server. Check Edge Function logs.');

        console.log('Subscription created:', data.id);

        // 2. Open Razorpay Checkout
        const options = {
          key: RAZORPAY_KEY_ID,
          subscription_id: data.id,
          name: APP_CONFIG.name,
          description: `${APP_CONFIG.plans[planKey].name} Plan — AR Menu`,
          image: 'https://ar-restaurant-menu-eta.vercel.app/favicon.ico',
          modal: {
            ondismiss: function() {
              if (document.body.contains(overlay)) document.body.removeChild(overlay);
            }
          },
          config: {
            display: {
              blocks: {
                banks: {
                  name: 'UPI Autopay (GPay, PhonePe, etc.)',
                  instruments: [
                    {
                      method: 'upi'
                    }
                  ]
                }
              },
              sequence: ['block.banks'],
              preferences: {
                show_default_blocks: true
              }
            }
          },
          handler: function (response) {
            console.log('Razorpay Response:', response);
            showToast('UPI Mandate Authorized! Activating your plan...', 'success');
            
            overlay.innerHTML = '<div style="text-align:center;"><div class="loader" style="margin:0 auto 20px;"></div><h3 style="color:#fff;">Activation in progress...</h3><p style="color:rgba(255,255,255,0.7);">We are verifying your UPI mandate and setting up your dashboard.</p></div>';
            
            setTimeout(() => {
              window.location.href = '/restaurant/index.html';
            }, 4000);
          },
          prefill: {
            name: restaurant.name,
            email: currentSession.user.email,
            contact: '' 
          },
          notes: {
            restaurant_id: restaurant.id,
            plan_key: planKey
          },
          theme: { color: "#6366f1" }
        };

        const rzp = new Razorpay(options);
        rzp.open();
        
      } catch (err) {
        showToast(err.message, 'error');
        console.error('Subscription Flow Error:', err);
      } finally {
        if (document.body.contains(overlay)) {
          document.body.removeChild(overlay);
        }
      }
    };

    init();
  </script>
</body>
</html>
