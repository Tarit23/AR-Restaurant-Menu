<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription — AR Menu Platform</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"></div>
      <div><div class="sidebar-logo-text">AR Menu</div><div class="sidebar-logo-sub" id="restNameSub">Restaurant</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">My Restaurant</div>
      <a class="nav-item" href="/restaurant">Dashboard</a>
      <a class="nav-item" href="/restaurant/menu">My Menu</a>
      <a class="nav-item active" href="/restaurant/subscription">Subscription</a>
      <a class="nav-item" href="/restaurant/qr">QR Code</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUserBtn">
        <div class="user-avatar" id="avatarInitial">R</div>
        <div><div class="user-name" id="restName">Restaurant</div><div class="user-role">Restaurant Owner</div></div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <header class="topbar">
      <button class="topbar-menu-btn" id="menuToggle">Menu</button>
      <div class="topbar-breadcrumb">
        <span id="topbarRestName">Restaurant</span><span>/</span><span class="current">Subscription</span>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header animate-in">
        <div class="page-header-text">
          <h1>Subscription</h1>
          <p>Manage your plan and billing</p>
        </div>
      </div>

      <div class="card animate-in animate-in-delay-1" style="margin-bottom:var(--space-8);">
        <div class="card-header">
          <div><div class="card-title">Current Plan</div><div class="card-subtitle">Your active subscription details</div></div>
        </div>
        <div id="currentPlanContent">
          <div class="skeleton" style="height:80px; border-radius:var(--radius-md);"></div>
        </div>
      </div>

      <div class="animate-in animate-in-delay-2">
        <h2 style="font-size:1.3rem; margin-bottom:var(--space-2);">Upgrade Your Plan</h2>
        <p style="color:var(--text-muted); font-size:.9rem; margin-bottom:var(--space-6);">Choose the plan that fits your restaurant</p>
        <div class="grid-2" id="planCards"></div>
      </div>
    </div>
  </div>

  <style>
  .current-plan-info { display: flex; align-items: center; gap: var(--space-6); padding: var(--space-5); background: var(--bg-elevated); border-radius: var(--radius-lg); }
  .current-plan-badge { background: var(--gradient-hero); color: #fff; padding: var(--space-3) var(--space-5); border-radius: var(--radius-full); font-weight: 700; font-size: .9rem; }
  .current-plan-detail { font-size:.85rem; color:var(--text-muted); }
  .current-plan-detail strong { color:var(--text-primary); }
  </style>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { APP_CONFIG, RAZORPAY_KEY_ID } from '../js/supabase-config.js';
    import { showToast, formatDate } from '../js/utils.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = '../login.html'; }

    const { data: profile } = await supabase.from('users').select('*, restaurants(*)').eq('id', session.user.id).single();
    if (!profile || profile.role === 'super_admin') window.location.href = '../admin/index.html';

    const restaurant = profile.restaurants;

    document.getElementById('restName').textContent    = restaurant.name;
    document.getElementById('restNameSub').textContent = restaurant.name.substring(0,16);
    document.getElementById('topbarRestName').textContent = restaurant.name;
    document.getElementById('avatarInitial').textContent  = restaurant.name[0].toUpperCase();

    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    });

    const planContent = document.getElementById('currentPlanContent');
    const statusColors = { active:'var(--success)', expired:'var(--danger)', pending:'var(--warning)' };
    planContent.innerHTML = `
      <div class="current-plan-info">
        <div class="current-plan-badge">${(restaurant.plan || 'No Plan').toUpperCase()}</div>
        <div class="current-plan-detail">Status: <strong style="color:${statusColors[restaurant.subscription_status]||'var(--text-muted)'};">${restaurant.subscription_status || 'N/A'}</strong></div>
        <div class="current-plan-detail">Next Payment: <strong>${formatDate(restaurant.next_payment_date)}</strong></div>
        <div class="current-plan-detail">Autopay: <strong>${restaurant.autopay_enabled ? 'Enabled' : 'Disabled'}</strong></div>
      </div>
    `;

    const plans = Object.entries(APP_CONFIG.plans);
    const plansContainer = document.getElementById('planCards');
    plansContainer.innerHTML = plans.map(([key, plan], i) => `
      <div class="plan-card ${key === 'pro' ? 'popular' : ''}">
        ${key === 'pro' ? '<div class="plan-popular-badge">Most Popular</div>' : ''}
        <div class="plan-name">${plan.name}</div>
        <div class="plan-price">₹${(plan.price/100).toLocaleString('en-IN')}<span>/mo</span></div>
        <ul class="plan-features">${plan.features.map(f => `<li>${f}</li>`).join('')}</ul>
        <button class="btn btn-${key === 'pro' ? 'primary' : 'secondary'} btn-full"
          onclick="subscribe('${key}', ${plan.price})"
          ${restaurant.plan === key && restaurant.subscription_status === 'active' ? 'disabled' : ''}>
          ${restaurant.plan === key && restaurant.subscription_status === 'active' ? '✓ Current Plan' : 'Subscribe →'}
        </button>
      </div>
    `).join('');

    window.subscribe = async (planKey, amount) => {
      const plan = APP_CONFIG.plans[planKey];
      showToast('Initializing payment...', 'info');
      const options = {
        key: RAZORPAY_KEY_ID, amount, currency: 'INR', name: 'AR Menu Platform',
        description: `${plan.name} Plan Membership`,
        prefill: { name: restaurant.name, email: restaurant.owner_email },
        theme: { color: '#6366f1' },
        handler: async (response) => {
          try {
            const nextDate = new Date(); nextDate.setMonth(nextDate.getMonth() + 1);
            await supabase.from('restaurants').update({
              plan: planKey, subscription_status: 'active', autopay_enabled: true,
              next_payment_date: nextDate.toISOString(), razorpay_subscription_id: response.razorpay_payment_id
            }).eq('id', restaurant.id);
            showToast('Subscription activated!', 'success');
            setTimeout(() => window.location.reload(), 1500);
          } catch (e) { showToast('DB update failed: ' + e.message, 'warning'); }
        }
      };
      const rzp = new Razorpay(options); rzp.open();
    };
  </script>
</body>
</html>
